<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Password Intelligence Analyzer</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <h1>🔐 Cyber Password Intelligence Analyzer</h1>

        <div class="input-box">

            <input
                type="password"
                id="password"
                placeholder="Enter Secure Password"
            >

            <button id="togglePassword">
                <i class="fa-solid fa-eye"></i>
            </button>

        </div>

        <div class="strength-container">
            <div class="strength-bar">
                <div id="strengthFill"></div>
            </div>

            <p id="strengthText">Password Strength: -</p>
        </div>

        <div class="stats">

            <div class="card">
                <h3>Entropy</h3>
                <p id="entropy">0 bits</p>
            </div>

            <div class="card">
                <h3>Estimated Crack Time</h3>
                <p id="crackTime">-</p>
            </div>

        </div>

        <div class="security-checks">

            <h2>Security Checklist</h2>

            <ul>

                <li id="lengthCheck">
                    ❌ Minimum 12 characters
                </li>

                <li id="upperCheck">
                    ❌ Uppercase Letter
                </li>

                <li id="lowerCheck">
                    ❌ Lowercase Letter
                </li>

                <li id="numberCheck">
                    ❌ Number
                </li>

                <li id="specialCheck">
                    ❌ Special Character
                </li>

                <li id="repeatCheck">
                    ❌ No Repeated Characters
                </li>

            </ul>

        </div>

        <div class="recommendations">

            <h2>Recommendations</h2>

            <ul id="recommendationList"></ul>

        </div>

        <div class="button-group">

            <button id="generateBtn">
                🎲 Generate Password
            </button>

            <button id="copyBtn">
                📋 Copy Password
            </button>

        </div>

    </div>

    <script src="common-passwords.js"></script>
    <script src="script.js"></script>

</body>
</html>
